syntax = "proto3";

import "google/protobuf/timestamp.proto";

package session;

option go_package = "github.com/barsboldb/ascend-backend/gen/session";

service SessionService {
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
}

message GetSessionRequest {
  string id = 1;
}

message GetSessionResponse {
  string                    id             = 1;
  string                    program_day_id = 2;
  int32                     week_number    = 3;
  google.protobuf.Timestamp started_at     = 4;
  google.protobuf.Timestamp ended_at       = 5;
  string                    notes          = 6;
  repeated SessionExercise  exercises      = 7;
}

message SessionExercise {
  string               exercise_id   = 1;
  string               exercise_name = 2;
  repeated ExerciseSet sets          = 3;
}

message ExerciseSet {
  string exercise_id   = 1;
  string exercise_name = 2;
  int32  set_number    = 3;
  float  weight_kg     = 4;
  int32  reps          = 5;
  bool   failure       = 6;
}
