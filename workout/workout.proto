syntax = "proto3";

package workout;

option go_package = "github.com/barsboldb/ascend-backend/gen/workout";

service WorkoutService {
  rpc LogWorkout(LogWorkoutRequest) returns (LogWorkoutResponse);
  rpc GetWorkout(GetWorkoutRequest) returns (GetWorkoutResponse);
}

message LogWorkoutRequest {
  string name            = 1;
  int32 duration_minutes = 2;
}

message LogWorkoutResponse {
  string id = 1;
}

message GetWorkoutRequest {
  string id = 1;
}

message GetWorkoutResponse {
  string id              = 1;
  string name            = 2;
  int32 duration_minutes = 3;
}
