syntax = "proto3";

import "google/protobuf/timestamp.proto";

package program;

option go_package = "github.com/barsboldb/ascend-backend/gen/program";

service ProgramService {
  rpc GetProgram(GetProgramRequest) returns (GetProgramResponse);
  rpc GetProgramDay(GetProgramDayRequest) returns (GetProgramDayResponse);
}

message GetProgramRequest {
  string id = 1;
}

message GetProgramResponse {
  string                    id          = 1;
  string                    name        = 2;
  string                    description = 3;
  int32                     total_weeks = 4;
  google.protobuf.Timestamp created_at  = 5; 
  repeated ProgramDay       days        = 6;
}

message ProgramDay {
  string id          = 1;
  int32  week_number = 2;
  int32  day_number  = 3;
  string label       = 4;
}

message GetProgramDayRequest {
  string id = 1;
}

message GetProgramDayResponse {
  string                    id          = 1;
  int32                     week_number = 2;
  int32                     day_number  = 3;
  string                    label       = 4;
  repeated ProgramExercise  exercises   = 5;
}

message ProgramExercise {
  string id               = 1;
  string name             = 2;
  string muscle_group     = 3;
  int32  sets             = 4;
  int32  rep_min          = 5;
  int32  rep_max          = 6;
  bool   is_amrap         = 7;
  bool   is_timed         = 8;
  float  weight_increment = 9;
}
